# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: '**'
  pull_request:
    branches: [ "main" ]

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
        
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build
        run: dotnet build --no-restore
      
      - name: Run Tests with Coverage
        run: |
          dotnet test --collect:"XPlat Code Coverage" \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Threshold=70 \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ThresholdType=line \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[*Domain*]*,[*Application*]*"
      
      - name: Generate Report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.10
        with:
          reports: '**/coverage.cobertura.xml'
          targetdir: 'coveragereport'
          reporttypes: 'HtmlInline;MarkdownSummary'

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: coveragereport
